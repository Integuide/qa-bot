# QA Bot - Manual Dispatch
#
# This workflow allows manually triggering QA testing via the GitHub Actions UI.
# Go to Actions > QA Bot (Manual) > Run workflow, then enter the URL to test.
#
# Setup:
# 1. Copy this file to .github/workflows/qa-bot-manual.yml
# 2. Add ANTHROPIC_API_KEY to repository secrets
# 3. Go to Actions tab and run manually

name: QA Bot (Manual)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test'
        required: true
        type: string

      goal:
        description: 'Testing focus (optional)'
        required: false
        type: string
        default: 'Explore user flows and find bugs, broken elements, and usability problems.'

      max-agents:
        description: 'Maximum parallel agents'
        required: false
        type: string
        default: '3'

      max-duration:
        description: 'Maximum duration (minutes)'
        required: false
        type: string
        default: '30'

      model:
        description: 'Claude model'
        required: false
        type: choice
        options:
          - claude-haiku-4-5
          - claude-sonnet-4-6
          - claude-opus-4-6
        default: 'claude-haiku-4-5'

      max-cost:
        description: 'Maximum cost in USD (default: $5.00)'
        required: false
        type: string
        default: '5.0'

jobs:
  qa-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run QA Bot
        id: qa
        uses: Integuide/qa-bot@main
        with:
          url: ${{ inputs.url }}
          goal: ${{ inputs.goal }}
          model: ${{ inputs.model }}
          max-agents: ${{ inputs.max-agents }}
          max-duration: ${{ inputs.max-duration }}
          max-cost: ${{ inputs.max-cost }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          post-comment: 'false'  # No PR to comment on

      - name: Write Summary
        if: always() && steps.qa.outcome != 'cancelled'
        env:
          INPUT_URL: ${{ inputs.url }}
          FLOWS: ${{ steps.qa.outputs.flows-explored }}
          ISSUES: ${{ steps.qa.outputs.issues-count }}
          CRITICAL: ${{ steps.qa.outputs.critical-issues }}
          REPORT: ${{ steps.qa.outputs.report }}
        run: |
          echo "### QA Bot Results for $INPUT_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Flows Explored | $FLOWS |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues Found | $ISSUES |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Issues | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Full Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$REPORT" >> $GITHUB_STEP_SUMMARY

      - name: Save report as artifact
        if: always() && steps.qa.outcome != 'cancelled'
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: |
            /tmp/qa-result.json
